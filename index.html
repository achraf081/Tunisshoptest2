
<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>تونس شوب | تجربة فاخرة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      :root {
        --app-bg: #f2f4d7;
        --app-primary: #2b4221;
        --app-accent: #ffbc0d;
        --app-red: #e31837;
      }
      body {
        font-family: 'Cairo', sans-serif;
        background-color: var(--app-bg);
        color: var(--app-primary);
        -webkit-tap-highlight-color: transparent;
        overflow-x: hidden;
      }
      
      /* Smooth Staggered Animation */
      @keyframes slideInUp {
        0% { opacity: 0; transform: translateY(40px) scale(0.95); }
        100% { opacity: 1; transform: translateY(0) scale(1); }
      }
      .animate-item {
        opacity: 0;
        animation: slideInUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      /* Hero Image Floating Effect */
      @keyframes heroFloat {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        50% { transform: translateY(-15px) rotate(2deg); }
      }
      .hero-float {
        animation: heroFloat 5s ease-in-out infinite;
      }

      /* Glowing background for premium items */
      .glow-bg {
        position: relative;
      }
      .glow-bg::before {
        content: '';
        position: absolute;
        inset: -10px;
        background: radial-gradient(circle, rgba(255,188,13,0.3) 0%, transparent 70%);
        z-index: -1;
        opacity: 0;
        transition: opacity 0.3s ease;
      }
      .glow-bg:hover::before {
        opacity: 1;
      }

      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      
      .glass {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.3);
      }

      /* Tab active indicator animation */
      .nav-indicator {
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react/": "https://esm.sh/react@^19.2.4/",

        "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
      }
    }
    </script>
  <link rel="stylesheet" href="/index.css">
</head>

</body>
</html>
